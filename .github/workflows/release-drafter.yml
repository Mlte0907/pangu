name: release-drafter

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  update_release_draft:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  label_triager:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # 自动给 PR 打 category / scope label
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Auto-classify by files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const changed = (pr.additions || 0) + (pr.deletions || 0);
            const labels = new Set();
            const title = (pr.title || '').toLowerCase();
            // type
            if (/^feat\b|新功能|新特性|add\b/.test(title)) labels.add('feature');
            else if (/^fix\b|修复|修\b/.test(title)) labels.add('fix');
            else if (/^perf\b|性能/.test(title)) labels.add('perf');
            else if (/^docs?\b|文档/.test(title)) labels.add('docs');
            else if (/^refactor\b|重构/.test(title)) labels.add('refactor');
            else if (/^test\b|测试/.test(title)) labels.add('test');
            else if (/^security\b|安全|CVE/.test(title)) labels.add('security');
            else if (/^chore\b|构建|CI|依赖/.test(title)) labels.add('chore');
            // size
            if (changed > 1000) labels.add('size/XL');
            else if (changed > 500) labels.add('size/L');
            else if (changed > 100) labels.add('size/M');
            else labels.add('size/S');
            // breaking
            if (pr.body && /BREAKING/.test(pr.body)) labels.add('breaking');
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: Array.from(labels),
              });
            }
