# Prometheus 监控配置
# =====================================
# 采集盘古 API 指标

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "pangu-monitor"

# 告警规则
rule_files:
  - "alerts.yml"

# 告警管理器（可选）
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]

# 抓取目标
scrape_configs:
  - job_name: "pangu"
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["pangu:19528"]
        labels:
          service: "pangu-api"
          tier: "production"

  - job_name: "pangu-prometheus"
    static_configs:
      - targets: ["localhost:9090"]
