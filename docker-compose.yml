# 盘古 — Docker Compose 编排
# =====================================
# 启动：docker compose up -d
# 停止：docker compose down
# 日志：docker compose logs -f pangu
# 重建：docker compose build --no-cache

services:
  # ─────────────────────────────────────
  # 主服务：盘古记忆系统
  # ─────────────────────────────────────
  pangu:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VERSION: 0.1.0
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    image: pangu:0.1.0
    container_name: pangu
    restart: unless-stopped
    ports:
      - "19528:19528"
    environment:
      PANGU_HOST: 0.0.0.0
      PANGU_PORT: 19528
      PANGU_API_KEY: ${PANGU_API_KEY:-}    # 留空则不启用鉴权
      PANGU_BASE_DIR: /data
      PANGU_LLM_PROVIDER: ${PANGU_LLM_PROVIDER:-ollama}
      PANGU_LLM_MODEL: ${PANGU_LLM_MODEL:-qwen2.5:7b}
      PANGU_EMBED_API_URL: ${PANGU_EMBED_API_URL:-http://ollama:11434/api/embed}
      PANGU_LOG_LEVEL: ${PANGU_LOG_LEVEL:-INFO}
    volumes:
      - pangu-data:/data
      - pangu-logs:/data/logs
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:19528/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - pangu-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────
  # 可选：本地 LLM（Ollama）
  # ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: pangu-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_NUM_PARALLEL: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - pangu-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─────────────────────────────────────
  # 可选：Prometheus 监控
  # ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: pangu-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]    # 默认不启动，加 --profile monitoring 启动
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - pangu-net

  # ─────────────────────────────────────
  # 可选：Grafana 可视化
  # ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: pangu-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - pangu-net

# ─────────────────────────────────────
# 数据卷
# ─────────────────────────────────────
volumes:
  pangu-data:
    driver: local
  pangu-logs:
    driver: local
  ollama-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ─────────────────────────────────────
# 网络
# ─────────────────────────────────────
networks:
  pangu-net:
    driver: bridge
    name: pangu-net
