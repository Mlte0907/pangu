# Prometheus 配置 — 抓取盘古 + Ollama 指标
# ===================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: pangu

# 告警规则
rule_files:
  - "prometheus-alerts.yml"

# 告警通道
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: pangu
    metrics_path: /metrics
    static_configs:
      - targets: ["pangu:19528"]
        labels:
          service: pangu

  - job_name: ollama
    metrics_path: /metrics
    static_configs:
      - targets: ["ollama:11434"]
        labels:
          service: ollama

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
